name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS arm64
            artifact_name: release-macos
            package_script: npm run package:mac
            artifact_glob: |
              release/*-arm64.dmg
              release/*.blockmap
              release/latest-mac.yml
          - os: windows-latest
            label: Windows x64
            artifact_name: release-windows
            package_script: npm run package:win
            artifact_glob: |
              release/*-x64.exe
              release/*.blockmap
              release/latest.yml
          - os: ubuntu-latest
            label: Linux x64
            artifact_name: release-linux
            package_script: npm run package:linux
            artifact_glob: |
              release/*-x64.AppImage
              release/*_amd64.deb
              release/latest-linux.yml

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        if: runner.os == 'Linux'
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Package desktop app
        run: ${{ matrix.package_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*
